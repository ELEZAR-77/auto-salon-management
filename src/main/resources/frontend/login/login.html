<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Auto Salone | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .login-container {
            background: #1e1e1e;
            padding: 32px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: none;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3f8cff;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #3577db;
        }

        .error {
            margin-top: 12px;
            color: #ff5c5c;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="login-container">
    <h1>Вход</h1>

    <input id="login" type="text" placeholder="Логин">
    <input id="password" type="password" placeholder="Пароль">

    <button onclick="login()">Войти</button>

    <div id="error" class="error"></div>
</div>

<script src="login.js"></script>
</body>
</html>
